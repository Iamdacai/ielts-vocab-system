<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录测试</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
  <div id="app">
    <h1>{{ message }}</h1>
    <button @click="count++">点击次数：{{ count }}</button>
    <div style="margin-top: 20px">
      <h3>登录表单测试：</h3>
      <input v-model="username" placeholder="用户名" />
      <input v-model="password" type="password" placeholder="密码" />
      <button @click="login">登录</button>
      <p v-if="loginResult">{{ loginResult }}</p>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue;
    
    createApp({
      setup() {
        const message = ref('✅ Vue 正常工作！');
        const count = ref(0);
        const username = ref('admin');
        const password = ref('admin123');
        const loginResult = ref('');
        
        const login = async () => {
          try {
            const res = await fetch('/api/admin/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username: username.value, password: password.value })
            });
            const data = await res.json();
            loginResult.value = data.success ? '✅ 登录成功！' : '❌ 登录失败：' + (data.message || data.error);
          } catch (e) {
            loginResult.value = '❌ 错误：' + e.message;
          }
        };
        
        return { message, count, username, password, loginResult, login };
      }
    }).mount('#app');
  </script>
</body>
</html>
